<!doctype html>
<html lang="en" data-theme="midnight">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Gemini Chatbot</title>
  <style>
    /* ---------- themes ---------- */
    :root,
    [data-theme="midnight"] {
      --bg: #0f1115;
      --bg-grad-1: radial-gradient(1200px 800px at 10% -10%, #1b2140 0%, transparent 60%);
      --bg-grad-2: radial-gradient(900px 700px at 110% 10%, #3a1f4d 0%, transparent 55%);
      --panel: #161922;
      --panel-2: #1d2230;
      --text: #e6e8ee;
      --muted: #8a93a6;
      --accent: #6c8cff;
      --accent-2: #8a6cff;
      --user-bg: linear-gradient(180deg, #303a66 0%, #232b50 100%);
      --assistant-bg: linear-gradient(180deg, #232838 0%, #181c28 100%);
      --border: #262b39;
      --code-bg: #0b0d13;
      --shadow: 0 12px 32px rgba(0,0,0,0.35);
      --hero-grad: linear-gradient(90deg, #a0b4ff, #d1b0ff);
    }
    [data-theme="sunrise"] {
      --bg: #fbf6ef;
      --bg-grad-1: radial-gradient(1100px 700px at 10% -10%, #ffe7c2 0%, transparent 60%);
      --bg-grad-2: radial-gradient(900px 700px at 110% 10%, #ffd6e0 0%, transparent 55%);
      --panel: #ffffff;
      --panel-2: #fdf3e6;
      --text: #2a2433;
      --muted: #7a6f80;
      --accent: #ff8a3d;
      --accent-2: #ff5d8f;
      --user-bg: linear-gradient(180deg, #ffd5b5 0%, #ffc098 100%);
      --assistant-bg: linear-gradient(180deg, #ffffff 0%, #fbf0e1 100%);
      --border: #f1d9c0;
      --code-bg: #fff5ea;
      --shadow: 0 12px 30px rgba(200, 120, 60, 0.18);
      --hero-grad: linear-gradient(90deg, #ff8a3d, #ff5d8f);
    }
    [data-theme="forest"] {
      --bg: #0e1612;
      --bg-grad-1: radial-gradient(1100px 700px at 10% -10%, #143527 0%, transparent 60%);
      --bg-grad-2: radial-gradient(900px 700px at 110% 10%, #1b3a2a 0%, transparent 55%);
      --panel: #16201b;
      --panel-2: #1c2a23;
      --text: #e2ecd9;
      --muted: #8aa395;
      --accent: #4cc38a;
      --accent-2: #9bd96b;
      --user-bg: linear-gradient(180deg, #244c39 0%, #1a3a2b 100%);
      --assistant-bg: linear-gradient(180deg, #1d2a23 0%, #14201a 100%);
      --border: #25372d;
      --code-bg: #0b1410;
      --shadow: 0 12px 32px rgba(0,0,0,0.35);
      --hero-grad: linear-gradient(90deg, #9bd96b, #4cc38a);
    }
    [data-theme="rose"] {
      --bg: #fff5f7;
      --bg-grad-1: radial-gradient(1100px 700px at 10% -10%, #ffe1ec 0%, transparent 60%);
      --bg-grad-2: radial-gradient(900px 700px at 110% 10%, #f5d8ff 0%, transparent 55%);
      --panel: #ffffff;
      --panel-2: #fdf2f6;
      --text: #3a2a35;
      --muted: #8a7682;
      --accent: #e35d8a;
      --accent-2: #b86cd1;
      --user-bg: linear-gradient(180deg, #ffd1de 0%, #ffb6cc 100%);
      --assistant-bg: linear-gradient(180deg, #ffffff 0%, #fbecf2 100%);
      --border: #f3d5e0;
      --code-bg: #fff0f5;
      --shadow: 0 12px 30px rgba(190, 80, 130, 0.18);
      --hero-grad: linear-gradient(90deg, #e35d8a, #b86cd1);
    }
    [data-theme="mono"] {
      --bg: #101013;
      --bg-grad-1: radial-gradient(1100px 700px at 10% -10%, #1d1d22 0%, transparent 60%);
      --bg-grad-2: radial-gradient(900px 700px at 110% 10%, #25252b 0%, transparent 55%);
      --panel: #18181c;
      --panel-2: #202024;
      --text: #ececef;
      --muted: #8d8d96;
      --accent: #d0d0d6;
      --accent-2: #a0a0a8;
      --user-bg: linear-gradient(180deg, #2e2e34 0%, #232328 100%);
      --assistant-bg: linear-gradient(180deg, #1d1d22 0%, #16161a 100%);
      --border: #2a2a30;
      --code-bg: #0c0c0f;
      --shadow: 0 12px 32px rgba(0,0,0,0.35);
      --hero-grad: linear-gradient(90deg, #ffffff, #b0b0b8);
    }
    [data-theme="ocean"] {
      --bg: #08131a;
      --bg-grad-1: radial-gradient(1100px 700px at 10% -10%, #0d2a40 0%, transparent 60%);
      --bg-grad-2: radial-gradient(900px 700px at 110% 10%, #144055 0%, transparent 55%);
      --panel: #0f1f2a;
      --panel-2: #142a38;
      --text: #dbeaf2;
      --muted: #7a96a8;
      --accent: #38b6e6;
      --accent-2: #2ad6c5;
      --user-bg: linear-gradient(180deg, #134f6b 0%, #0e3b51 100%);
      --assistant-bg: linear-gradient(180deg, #142a38 0%, #0c1e29 100%);
      --border: #1d3848;
      --code-bg: #07131a;
      --shadow: 0 12px 32px rgba(0,0,0,0.35);
      --hero-grad: linear-gradient(90deg, #38b6e6, #2ad6c5);
    }

    * { box-sizing: border-box; }
    html, body { height: 100%; margin: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg-grad-1), var(--bg-grad-2), var(--bg);
      color: var(--text);
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      transition: background-color 200ms ease, color 200ms ease;
    }
    header {
      padding: 14px 20px;
      border-bottom: 1px solid var(--border);
      background: color-mix(in srgb, var(--bg) 75%, transparent);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .brand { display: flex; align-items: center; gap: 10px; font-weight: 600; letter-spacing: 0.2px; }
    .logo {
      width: 28px; height: 28px; border-radius: 8px;
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      box-shadow: 0 6px 20px color-mix(in srgb, var(--accent) 35%, transparent);
    }
    .meta { color: var(--muted); font-size: 12px; }

    .theme-picker {
      display: flex;
      align-items: center;
      gap: 6px;
      color: var(--muted);
      font-size: 12px;
    }
    .theme-picker select {
      background: var(--panel);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 6px 8px;
      font: inherit;
      font-size: 12px;
      cursor: pointer;
      outline: none;
    }
    .theme-picker select:focus { border-color: var(--accent); }

    main {
      flex: 1;
      width: 100%;
      max-width: 860px;
      margin: 0 auto;
      padding: 18px 16px 140px;
    }

    .msg {
      display: flex;
      gap: 12px;
      margin: 14px 0;
      animation: pop 180ms ease-out;
    }
    .msg.user { flex-direction: row-reverse; }
    @keyframes pop {
      from { opacity: 0; transform: translateY(4px); }
      to   { opacity: 1; transform: none; }
    }
    .avatar {
      width: 30px; height: 30px; border-radius: 50%;
      flex: 0 0 30px;
      display: grid; place-items: center;
      font-size: 13px; font-weight: 700;
      color: white;
      align-self: flex-end;
    }
    .avatar.user { background: linear-gradient(135deg, var(--accent), var(--accent-2)); }
    .avatar.assistant { background: linear-gradient(135deg, var(--accent-2), var(--accent)); }
    .bubble {
      padding: 12px 14px;
      border: 1px solid var(--border);
      line-height: 1.5;
      max-width: 72%;
      word-wrap: break-word;
      overflow-wrap: anywhere;
      box-shadow: var(--shadow);
    }
    .msg.user .bubble {
      background: var(--user-bg);
      border-radius: 18px 18px 4px 18px;
    }
    .msg.assistant .bubble {
      background: var(--assistant-bg);
      border-radius: 18px 18px 18px 4px;
    }
    .bubble pre {
      background: var(--code-bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 12px;
      overflow-x: auto;
      margin: 8px 0;
    }
    .bubble code {
      background: var(--code-bg);
      padding: 1px 6px;
      border-radius: 4px;
      font-size: 0.9em;
    }
    .bubble pre code { background: transparent; padding: 0; }
    .bubble p:first-child { margin-top: 0; }
    .bubble p:last-child { margin-bottom: 0; }
    .typing {
      display: inline-block;
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--muted);
      animation: blink 1s infinite;
      margin-left: 4px;
    }
    @keyframes blink {
      0%, 80%, 100% { opacity: 0.2; }
      40% { opacity: 1; }
    }
    .empty {
      text-align: center;
      color: var(--muted);
      margin-top: 22vh;
    }
    .empty h1 {
      font-size: 28px; margin: 8px 0 6px; color: var(--text);
      background: var(--hero-grad);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }
    .examples {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 10px;
      margin-top: 24px;
    }
    .example {
      border: 1px solid var(--border);
      background: var(--panel);
      padding: 12px 14px;
      border-radius: 10px;
      cursor: pointer;
      text-align: left;
      color: var(--text);
      transition: border-color 120ms, transform 120ms;
      font: inherit;
    }
    .example:hover {
      border-color: var(--accent);
      transform: translateY(-1px);
    }
    footer {
      position: fixed;
      left: 0; right: 0; bottom: 0;
      background: linear-gradient(to top, var(--bg) 60%, color-mix(in srgb, var(--bg) 0%, transparent));
      padding: 16px;
    }
    .composer {
      max-width: 860px;
      margin: 0 auto;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 10px;
      display: flex;
      gap: 8px;
      align-items: end;
      box-shadow: 0 12px 40px rgba(0,0,0,0.25);
    }
    textarea {
      flex: 1;
      resize: none;
      border: 0;
      background: transparent;
      color: var(--text);
      font: inherit;
      padding: 8px 10px;
      max-height: 160px;
      outline: none;
    }
    .btn {
      border: 0;
      border-radius: 10px;
      padding: 0 14px;
      height: 38px;
      font-weight: 600;
      cursor: pointer;
      color: white;
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      transition: transform 80ms, opacity 120ms;
    }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn:active { transform: translateY(1px); }
    .btn.ghost {
      background: transparent;
      color: var(--muted);
      border: 1px solid var(--border);
    }
    .row { display: flex; gap: 8px; align-items: center; }
    .hint { color: var(--muted); font-size: 12px; text-align: center; margin-top: 6px; }
  </style>
</head>
<body>
  <header>
    <div class="brand">
      <div class="logo"></div>
      <div>Gemini Chatbot</div>
    </div>
    <div class="row">
      <div class="meta">model: <span id="model">{{ model }}</span></div>
      <div class="theme-picker">
        <label for="theme">theme</label>
        <select id="theme">
          <option value="midnight">Midnight</option>
          <option value="sunrise">Sunrise</option>
          <option value="forest">Forest</option>
          <option value="rose">Rosé</option>
          <option value="ocean">Ocean</option>
          <option value="mono">Mono</option>
        </select>
      </div>
      <button class="btn ghost" id="clear" title="Clear chat">Clear</button>
    </div>
  </header>

  <main id="main">
    <div id="empty" class="empty">
      <h1>How can I help you today?</h1>
      <div>Ask anything — code, ideas, explanations, brainstorming.</div>
      <div class="examples">
        <button class="example">Explain async/await in JavaScript with an example.</button>
        <button class="example">Write a Python function to flatten a nested list.</button>
        <button class="example">Suggest 5 healthy weeknight dinner ideas.</button>
        <button class="example">Summarize the difference between TCP and UDP.</button>
      </div>
    </div>
    <div id="messages"></div>
  </main>

  <footer>
    <form id="composer" class="composer">
      <textarea id="input" rows="1" placeholder="Send a message…  (Enter to send, Shift+Enter for newline)"></textarea>
      <button id="send" class="btn" type="submit">Send</button>
    </form>
    <div class="hint">Press <b>Enter</b> to send · <b>Shift+Enter</b> for a new line</div>
  </footer>

  <script>
    const messagesEl = document.getElementById('messages');
    const emptyEl = document.getElementById('empty');
    const input = document.getElementById('input');
    const sendBtn = document.getElementById('send');
    const composer = document.getElementById('composer');
    const clearBtn = document.getElementById('clear');
    const themeSelect = document.getElementById('theme');

    const history = [];

    /* ---------- theme ---------- */
    const THEMES = ['midnight', 'sunrise', 'forest', 'rose', 'ocean', 'mono'];
    const savedTheme = localStorage.getItem('chat-theme');
    const initialTheme = THEMES.includes(savedTheme) ? savedTheme : 'midnight';
    document.documentElement.setAttribute('data-theme', initialTheme);
    themeSelect.value = initialTheme;
    themeSelect.addEventListener('change', () => {
      const t = themeSelect.value;
      document.documentElement.setAttribute('data-theme', t);
      localStorage.setItem('chat-theme', t);
    });

    /* ---------- composer ---------- */
    function autosize() {
      input.style.height = 'auto';
      input.style.height = Math.min(input.scrollHeight, 160) + 'px';
    }
    input.addEventListener('input', autosize);

    input.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        composer.requestSubmit();
      }
    });

    document.querySelectorAll('.example').forEach(b => {
      b.addEventListener('click', () => {
        input.value = b.textContent.trim();
        autosize();
        composer.requestSubmit();
      });
    });

    clearBtn.addEventListener('click', () => {
      history.length = 0;
      messagesEl.innerHTML = '';
      emptyEl.style.display = '';
    });

    function renderMarkdown(text) {
      const esc = text
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;');
      let out = esc.replace(/```([\w+-]*)\n([\s\S]*?)```/g, (_, lang, code) => {
        return `<pre><code>${code.replace(/\n$/, '')}</code></pre>`;
      });
      out = out.replace(/`([^`\n]+)`/g, '<code>$1</code>');
      out = out.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
      out = out.replace(/(^|[\s(])\*([^*\n]+)\*(?=[\s).,!?]|$)/g, '$1<em>$2</em>');
      out = out
        .split(/\n{2,}/)
        .map(block => block.startsWith('<pre>') ? block : `<p>${block.replace(/\n/g, '<br>')}</p>`)
        .join('');
      return out;
    }

    function addMessage(role, content) {
      emptyEl.style.display = 'none';
      const wrap = document.createElement('div');
      wrap.className = `msg ${role}`;
      const avatar = document.createElement('div');
      avatar.className = `avatar ${role}`;
      avatar.textContent = role === 'user' ? 'U' : 'G';
      const bubble = document.createElement('div');
      bubble.className = 'bubble';
      bubble.innerHTML = renderMarkdown(content);
      wrap.appendChild(avatar);
      wrap.appendChild(bubble);
      messagesEl.appendChild(wrap);
      window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
      return bubble;
    }

    async function send(userText) {
      history.push({ role: 'user', content: userText });
      addMessage('user', userText);

      const bubble = addMessage('assistant', '');
      bubble.innerHTML = '<span class="typing"></span>';

      sendBtn.disabled = true;
      input.disabled = true;

      try {
        const res = await fetch('/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ messages: history }),
        });

        if (!res.ok || !res.body) {
          bubble.innerHTML = `<em>Request failed (${res.status})</em>`;
          return;
        }

        const reader = res.body.getReader();
        const decoder = new TextDecoder();
        let buffer = '';
        let assistantText = '';
        let first = true;

        while (true) {
          const { value, done } = await reader.read();
          if (done) break;
          buffer += decoder.decode(value, { stream: true });
          const parts = buffer.split('\n\n');
          buffer = parts.pop() ?? '';
          for (const part of parts) {
            const line = part.split('\n').find(l => l.startsWith('data: '));
            if (!line) continue;
            const payload = line.slice(6);
            try {
              const obj = JSON.parse(payload);
              if (obj.token) {
                if (first) { bubble.innerHTML = ''; first = false; }
                assistantText += obj.token;
                bubble.innerHTML = renderMarkdown(assistantText);
                window.scrollTo({ top: document.body.scrollHeight });
              } else if (obj.error) {
                bubble.innerHTML = `<em>Error: ${obj.error}</em>`;
              }
            } catch {}
          }
        }

        if (assistantText) {
          history.push({ role: 'assistant', content: assistantText });
        } else if (first) {
          bubble.innerHTML = '<em>(no response)</em>';
        }
      } catch (err) {
        bubble.innerHTML = `<em>Network error: ${err.message}</em>`;
      } finally {
        sendBtn.disabled = false;
        input.disabled = false;
        input.focus();
      }
    }

    composer.addEventListener('submit', (e) => {
      e.preventDefault();
      const text = input.value.trim();
      if (!text) return;
      input.value = '';
      autosize();
      send(text);
    });

    input.focus();
  </script>
</body>
</html>
